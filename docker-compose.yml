# One-command self-host. `docker compose up` → http://localhost:8000
# Qdrant runs embedded inside the app container (no separate service needed);
# for a standalone Qdrant, uncomment the qdrant service and set QDRANT_URL.
services:
  eurag:
    build: .
    image: eurag:latest
    ports:
      - "8000:8000"
    env_file:
      - .env            # ANTHROPIC_API_KEY and any EURAG_* overrides
    volumes:
      - eurag-var:/app/var        # registry, vectors, auth db — persisted
      - ./data/raw:/app/data/raw  # corpus cache (populate via the scrapers)
    restart: unless-stopped

  # Optional standalone Qdrant. Uncomment and set QDRANT_URL=http://qdrant:6333
  # in .env to use it instead of the embedded store.
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   volumes:
  #     - qdrant-storage:/qdrant/storage
  #   restart: unless-stopped

volumes:
  eurag-var:
  # qdrant-storage:
